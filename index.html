<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLB Live Scoreboard</title>
  <meta name="description" content="Live scoreboard of all MLB games, auto-refreshing from the MLB StatsAPI." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>⚾</text></svg>" />
  <link rel="stylesheet" href="styles.css" />
  <!-- ===== Victory Bombs ticker: block 1/3 (CSS) ===== -->
  <style id="vb-ticker-css">
    :root{
      --vbt-bg:#0b0f17; --vbt-line:#1f2a3a; --vbt-txt:#e8eef7; --vbt-mut:#8da2bd;
      --vbt-accent:#ffce4b; --vbt-good:#27d07a; --vbt-live:#ff5d6c; --vbt-strong:#5db7ff;
    }
    /* container pinned to top */
    #vb-ticker{position:sticky;top:0;z-index:50;background:var(--vbt-bg);
      border-bottom:1px solid var(--vbt-line);color:var(--vbt-txt);
      font:13px/1 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      overflow:hidden;white-space:nowrap;display:flex;align-items:stretch}
    .vbt-label{display:flex;align-items:center;gap:6px;padding:0 12px;font-weight:800;
      letter-spacing:.5px;font-size:11px;text-transform:uppercase;background:#0f1622;
      border-right:1px solid var(--vbt-line);flex:none}
    .vbt-label.scores{color:var(--vbt-good)}
    .vbt-label.picks{color:var(--vbt-accent)}
    .vbt-dot{width:7px;height:7px;border-radius:50%;background:currentColor;
      box-shadow:0 0 0 0 currentColor;animation:vbt-pulse 1.8s infinite}
    @keyframes vbt-pulse{0%{box-shadow:0 0 0 0 rgba(255,93,108,.5)}70%{box-shadow:0 0 0 7px rgba(255,93,108,0)}100%{box-shadow:0 0 0 0 rgba(255,93,108,0)}}
    .vbt-track{flex:1;overflow:hidden;position:relative}
    .vbt-move{display:inline-block;padding:9px 0;will-change:transform;
      animation:vbt-scroll var(--vbt-dur,60s) linear infinite}
    #vb-ticker:hover .vbt-move{animation-play-state:paused}
    @keyframes vbt-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
    .vbt-item{display:inline-flex;align-items:center;gap:7px;padding:0 18px;
      border-right:1px solid var(--vbt-line)}
    .vbt-team{color:var(--vbt-mut)}
    .vbt-sc{font-variant-numeric:tabular-nums;font-weight:700}
    .vbt-st{color:var(--vbt-mut);font-size:11px;text-transform:uppercase;letter-spacing:.4px}
    .vbt-st.live{color:var(--vbt-live);font-weight:700}
    .vbt-st.final{color:var(--vbt-txt)}
    .vbt-pill{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;
      font-weight:800;letter-spacing:.4px}
    .vbt-pill.ELITE{background:rgba(255,206,75,.18);color:var(--vbt-accent)}
    .vbt-pill.STRONG{background:rgba(93,183,255,.18);color:var(--vbt-strong)}
    .vbt-pill.LEAN{background:rgba(154,167,189,.18);color:var(--vbt-mut)}
    .vbt-pl{color:var(--vbt-accent);font-weight:700}
    .vbt-model{color:var(--vbt-good);font-weight:700;font-variant-numeric:tabular-nums}
    @media (max-width:640px){.vbt-label{padding:0 8px;font-size:10px}}
  </style>
</head>
<body>
  <!-- ===== Victory Bombs ticker: block 2/3 (markup — first element in body) ===== -->
  <div id="vb-ticker" aria-label="Live scores and top home-run picks">
    <div class="vbt-track" id="vbt-scores-track">
      <span class="vbt-label scores"><span class="vbt-dot"></span>Scores</span>
      <span class="vbt-move" id="vbt-scores">loading…</span>
    </div>
    <div class="vbt-track" id="vbt-picks-track">
      <span class="vbt-label picks">⚾ HR Picks</span>
      <span class="vbt-move" id="vbt-picks">loading…</span>
    </div>
  </div>

  <header class="topbar">
    <div class="topbar-inner">
      <h1 class="title">⚾ MLB Live Scoreboard</h1>
      <div class="controls">
        <button id="prev-day" class="nav-btn" title="Previous day" aria-label="Previous day">‹</button>
        <input type="date" id="date-picker" class="date-picker" />
        <button id="next-day" class="nav-btn" title="Next day" aria-label="Next day">›</button>
        <button id="today-btn" class="today-btn" title="Jump to today">Today</button>
      </div>
    </div>
    <div class="statusline">
      <span id="status-text" class="status-text">Loading…</span>
      <span class="status-right">
        <span id="refresh-state" class="refresh-state"></span>
        <button id="refresh-btn" class="refresh-btn" title="Refresh now">↻ Refresh</button>
      </span>
    </div>
  </header>

  <main id="board" class="board">
    <p class="placeholder">Loading today's games…</p>
  </main>

  <footer class="footer">
    <p>
      Data: <a href="https://statsapi.mlb.com" target="_blank" rel="noopener">MLB StatsAPI</a>
      (unofficial, keyless). Auto-refreshes every <span id="refresh-secs"></span>s.
      Not affiliated with MLB.
    </p>
    <p>⚾ <a href="results.html">Victory Bombs — Card Review</a></p>
  </footer>

  <script src="app.js"></script>
  <!-- ===== Victory Bombs ticker: block 3/3 (script — before </body>) ===== -->
  <script id="vb-ticker-js">
  (function(){
    const STATSAPI = "https://statsapi.mlb.com/api/v1";
    const PICKS_URL = "picks.json";        // <-- where hr_engine.py publishes the HR board (same-origin)
    const SCORE_MS  = 25000;               // scores refresh
    const PICKS_MS  = 5*60*1000;           // picks refresh
    const etDate = () => new Date(Date.now()-4*3600*1000).toISOString().slice(0,10);

    // Duplicate content once so the -50% scroll loop is seamless.
    function setMove(id, html){
      const span = document.getElementById(id);
      if(!html){ span.textContent = "—"; return; }
      span.innerHTML = html + html;
      // scale duration to content length so speed feels constant
      const items = (html.match(/vbt-item/g)||[]).length || 1;
      span.style.setProperty("--vbt-dur", Math.max(25, items*6)+"s");
    }

    // ---------- SCORES ----------
    async function loadScores(){
      try{
        const r = await fetch(`${STATSAPI}/schedule?sportId=1&date=${etDate()}&hydrate=linescore,team`,{cache:"no-store"});
        const j = await r.json();
        const games = (j.dates&&j.dates[0]&&j.dates[0].games)||[];
        if(!games.length){ setMove("vbt-scores", `<span class="vbt-item vbt-st">No games today</span>`); return; }
        const html = games.map(g=>{
          const a=g.teams.away, h=g.teams.home;
          const ab=(a.team.abbreviation||a.team.name||"").slice(0,3).toUpperCase();
          const hb=(h.team.abbreviation||h.team.name||"").slice(0,3).toUpperCase();
          const st=g.status.abstractGameState; const ls=g.linescore||{};
          let state, cls="";
          if(st==="Final"){ state="Final"; cls="final"; }
          else if(st==="Live"){ const inn=ls.currentInningOrdinal||""; const ha=(ls.inningHalf||"").slice(0,3);
            state=`${ha} ${inn}`.trim(); cls="live"; }
          else { state=new Date(g.gameDate).toLocaleTimeString([], {hour:"numeric",minute:"2-digit"}); }
          const showScore = (st==="Final"||st==="Live");
          const score = showScore ? `<span class="vbt-sc">${a.score??0}–${h.score??0}</span>` : "";
          return `<span class="vbt-item"><span class="vbt-team">${ab}@${hb}</span>${score}<span class="vbt-st ${cls}">${state}</span></span>`;
        }).join("");
        setMove("vbt-scores", html);
      }catch(e){ setMove("vbt-scores", `<span class="vbt-item vbt-st">scores unavailable</span>`); }
    }

    // ---------- PICKS ----------
    async function loadPicks(){
      try{
        const r = await fetch(PICKS_URL,{cache:"no-store"});
        if(!r.ok) throw 0;
        const j = await r.json();
        const picks = j.picks || j || [];
        if(!picks.length){ setMove("vbt-picks", `<span class="vbt-item vbt-st">No picks posted</span>`); return; }
        const html = picks.map(p=>{
          const tier=(p.tier||"LEAN").toUpperCase().replace("*","");
          const model=(p.model_pct!=null)?`<span class="vbt-model">${Number(p.model_pct).toFixed(1)}%</span>`:"";
          const price=(p.best_over)?`<span class="vbt-pl">${p.best_over}</span>`:"";
          const proj=(p.lineup&&p.lineup!=="CONFIRMED")?` <span class="vbt-st">proj</span>`:"";
          return `<span class="vbt-item"><span class="vbt-pill ${tier}">${tier}</span>`+
                 `<b>${p.player||""}</b> <span class="vbt-team">${p.team||""}</span> ${model} ${price}${proj}</span>`;
        }).join("");
        setMove("vbt-picks", html);
      }catch(e){
        // graceful: hide the picks row if no picks file is published
        document.getElementById("vbt-picks-track").style.display="none";
      }
    }

    loadScores(); loadPicks();
    setInterval(loadScores, SCORE_MS);
    setInterval(loadPicks, PICKS_MS);
  })();
  </script>
</body>
</html>
